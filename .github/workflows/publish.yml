name: Render & Publish (HTML)

# =========================================================================
#  GitHub Pages — "Build & deployment: GitHub Actions"
#  Pré-requisito: Settings → Pages → Source: GitHub Actions
#
#  3 jobs:
#    1. validate-bib → valida references.bib. Em PRs, só este job roda.
#    2. build        → quarto render (saída em docs/), empacota como artifact.
#    3. deploy       → publica em github-pages. Só em push para main.
# =========================================================================

on:
  push:
    branches: [main]
    paths:
      - '**/*.qmd'
      - '**/*.bib'
      - '**/*.scss'
      - '**/*.css'
      - '**/*.yml'
      - 'code/**'
      - 'images/**'
      - 'fonts/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate-bib:
    name: Validar bibliografia
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: code/requirements.txt
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
      - name: Validação rápida (offline)
        run: python code/validate_bib.py --no-doi --json validation-basic.json
      - name: Upload relatório
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bibliography-report
          path: validation-basic.json
          retention-days: 30

  build:
    name: Build site (Quarto)
    needs: validate-bib
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'   # PRs só validam
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # data do último commit nas páginas
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Render HTML
        run: quarto render --to html
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    name: Deploy → GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
